<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BG Board Game 內部管理</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #151515;
      --surface: #1f2023;
      --surface-soft: #232427;
      --surface-strong: #26272b;
      --border-soft: rgba(255,255,255,0.06);
      --border-strong: rgba(255,255,255,0.14);
      --accent: #3fb6c7;
      --accent-strong: #2f92a1;
      --accent-soft: rgba(63,182,199,0.16);
      --text-main: #f5f3ee;
      --text-muted: #9b9ea5;
      --text-soft: #70737b;
      --danger: #f0719b;
      --radius-pill: 999px;
      --radius-lg: 18px;
      --radius-md: 12px;
      --shadow-soft: 0 22px 60px rgba(0,0,0,0.65);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:'Satoshi','system-ui','-apple-system',BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:radial-gradient(circle at top left,#252733 0,#151515 45%,#090909 100%);
      color:var(--text-main);
    }
    img{max-width:100%;display:block}
    button{font-family:inherit}
    .app{max-width:1100px;margin:0 auto;padding:22px 16px 40px;}
    .shell{
      border-radius:28px;
      background:radial-gradient(circle at top,#313644,#202226 55%,#18191c 100%);
      box-shadow:var(--shadow-soft);
      padding:18px 18px 22px;
      border:1px solid rgba(255,255,255,0.03);
    }
    header{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:16px;}
    .brand{display:flex;align-items:center;gap:10px;}
    .logo{
      width:40px;height:40px;border-radius:16px;
      background:conic-gradient(from 200deg,#3fb6c7,#f0719b,#f3c969,#3fb6c7);
      display:flex;align-items:center;justify-content:center;
    }
    .logo span{font-size:0.78rem;font-weight:700;color:#081015;letter-spacing:0.06em;}
    h1{font-size:1.1rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:700;}
    .subtitle{font-size:0.8rem;color:var(--text-soft);}
    .header-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
    .pill{
      border-radius:var(--radius-pill);
      padding:6px 12px;
      font-size:0.78rem;
      border:1px solid var(--border-soft);
      background:rgba(18,19,22,0.72);
      color:var(--text-muted);
    }
    .pill strong{color:var(--accent);}
    .login-box{
      border-radius:20px;
      background:var(--surface);
      border:1px solid var(--border-soft);
      padding:12px 14px;
      margin-bottom:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .login-info{font-size:0.82rem;color:var(--text-muted);}
    .login-controls{display:flex;gap:8px;align-items:center;}
    input[type="password"],input[type="text"]{
      border-radius:var(--radius-pill);
      border:1px solid var(--border-soft);
      background:rgba(9,10,13,0.9);
      color:var(--text-main);
      padding:7px 11px;
      font-size:0.82rem;
      min-width:160px;
    }
    .btn{
      border-radius:var(--radius-pill);
      border:none;
      padding:7px 13px;
      font-size:0.8rem;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .btn-primary{background:var(--accent);color:#081015;}
    .btn-primary:hover{background:var(--accent-strong);}
    .btn-ghost{background:rgba(10,11,15,0.9);color:var(--text-main);}
    .btn-ghost:hover{background:rgba(32,34,40,0.9);}
    .locked{color:var(--danger);font-size:0.8rem;}
    .layout{display:grid;grid-template-columns:1.25fr 0.9fr;gap:16px;}
    .panel{
      border-radius:20px;
      background:var(--surface);
      border:1px solid var(--border-soft);
      padding:14px 15px 15px;
    }
    .panel-title{font-size:0.9rem;font-weight:600;margin-bottom:4px;}
    .panel-sub{font-size:0.78rem;color:var(--text-muted);margin-bottom:10px;}
    .form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:4px;font-size:0.82rem;}
    .field{display:flex;flex-direction:column;gap:4px;}
    .field.full{grid-column:1/-1;}
    label{font-size:0.78rem;color:var(--text-muted);}
    select,textarea{
      border-radius:var(--radius-md);
      border:1px solid var(--border-soft);
      background:var(--surface-soft);
      color:var(--text-main);
      padding:7px 10px;
      font-size:0.82rem;
    }
    textarea{min-height:80px;resize:vertical;}
    .input-dark{
      border-radius:var(--radius-md);
      border:1px solid var(--border-soft);
      background:var(--surface-soft);
      color:var(--text-main);
      padding:7px 10px;
      font-size:0.82rem;
    }
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;font-size:0.8rem;}
    .pill-tab{
      border-radius:var(--radius-pill);
      padding:6px 10px;
      font-size:0.78rem;
      border:none;
      background:rgba(15,16,20,0.9);
      color:var(--text-muted);
      cursor:pointer;
    }
    .pill-tab.active{background:var(--accent-soft);color:var(--accent);}
    .list{display:flex;flex-direction:column;gap:8px;font-size:0.8rem;}
    .list-row{
      border-radius:14px;
      background:var(--surface-soft);
      border:1px solid var(--border-soft);
      padding:8px 9px;
      display:flex;
      justify-content:space-between;
      gap:8px;
    }
    .list-main strong{font-size:0.9rem;}
    .list-main span{color:var(--text-soft);font-size:0.78rem;}
    .badge{
      border-radius:var(--radius-pill);
      padding:3px 8px;
      font-size:0.76rem;
      background:rgba(255,255,255,0.06);
      color:var(--text-muted);
    }
    .danger-text{color:var(--danger);}
    .success-text{color:#8fd8aa;}
    .small{font-size:0.78rem;color:var(--text-muted);}
    .hidden{display:none !important;}
    @media (max-width:840px){
      .layout{grid-template-columns:1fr;}
    }
    @media (max-width:640px){
      .shell{border-radius:22px;padding:14px 12px 18px;}
      header{flex-direction:column;align-items:flex-start;}
      .login-box{flex-direction:column;align-items:flex-start;}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <header>
        <div class="brand">
          <div class="logo"><span>BG</span></div>
          <div>
            <h1>BG Board Game 內部管理</h1>
            <p class="subtitle">新增桌遊、更新配件、處理預約與歸還（需密碼登入）</p>
          </div>
        </div>
        <div class="header-actions">
          <div class="pill">目前資料來自 <strong>Google Sheets</strong></div>
        </div>
      </header>

      <div class="login-box">
        <div class="login-info">
          只有中心同事可登入內部管理頁。請輸入管理密碼，以保護桌遊資料與借用紀錄。
          <div id="loginStatus" class="locked">尚未登入</div>
        </div>
        <div class="login-controls">
          <input id="adminPassword" type="password" placeholder="輸入管理密碼" />
          <button class="btn btn-primary" id="loginBtn">登入</button>
        </div>
      </div>

      <div id="protectedArea" class="layout hidden">
        <!-- 左側：新增 / 編輯桌遊 + 配件 -->
        <section class="panel">
          <div class="panel-title">桌遊資料與配件管理</div>
          <p class="panel-sub">先選擇既有桌遊或輸入新的 Game ID，再填寫基本資料與配件清單，儲存後會同步到前台網站。</p>

          <div class="toolbar">
            <div class="small">選擇既有桌遊：</div>
            <select id="existingGameSelect" class="input-dark" style="min-width:200px;"></select>
          </div>

          <form id="gameForm" class="form-grid">
            <div class="field">
              <label for="gameId">Game ID（必填）</label>
              <input id="gameId" type="text" class="input-dark" placeholder="例如 BG001" required />
            </div>
            <div class="field">
              <label for="gameName">桌遊名稱</label>
              <input id="gameName" type="text" class="input-dark" placeholder="完整名稱" required />
            </div>
            <div class="field">
              <label for="gameCategory">類型</label>
              <input id="gameCategory" type="text" class="input-dark" placeholder="派對 / 策略 / 家庭等" />
            </div>
            <div class="field">
              <label for="gameStatus">狀態</label>
              <select id="gameStatus">
                <option value="available">available（可借）</option>
                <option value="maintenance">maintenance（維修/缺件）</option>
                <option value="inactive">inactive（已下架）</option>
              </select>
            </div>
            <div class="field full">
              <label for="gameCover">封面圖片 URL</label>
              <input id="gameCover" type="text" class="input-dark" placeholder="貼上已上傳圖片的 URL" />
            </div>
            <div class="field full">
              <label for="gameShort">簡易玩法一句</label>
              <input id="gameShort" type="text" class="input-dark" placeholder="例如：陣營推理派對遊戲" />
            </div>
            <div class="field full">
              <label for="gameDetail">詳細玩法介紹</label>
              <textarea id="gameDetail" placeholder="可寫遊戲目標、流程與人數時間等"></textarea>
            </div>
            <div class="field full">
              <label for="gameYoutube">YouTube 教學連結</label>
              <input id="gameYoutube" type="text" class="input-dark" placeholder="貼上教學影片 URL" />
            </div>
            <div class="field full">
              <label for="gamePublicNote">公開備註</label>
              <textarea id="gamePublicNote" placeholder="例如：盒角有輕微磨損，借出前會向借用者說明"></textarea>
            </div>
            <div class="field full">
              <label for="gameInternalNote">內部備註</label>
              <textarea id="gameInternalNote" placeholder="只供同事查看，例如：需補卡 / 優先保養等"></textarea>
            </div>
            <div class="field full">
              <label for="itemsInput">配件清單（每行一項，格式：名稱|數量|單位|是否重點）</label>
              <textarea id="itemsInput" placeholder="角色卡|15|張|TRUE&#10;投票牌|10|片|TRUE&#10;木 token|30|枚|FALSE"></textarea>
            </div>
            <div class="field full" style="margin-top:4px;">
              <button type="submit" class="btn btn-primary">儲存桌遊資料</button>
              <span id="saveStatus" class="small" style="margin-left:8px;"></span>
            </div>
          </form>
        </section>

        <!-- 右側：桌遊列表概覽 + 借用狀態摘要 -->
        <aside class="panel">
          <div class="panel-title">桌遊概覽</div>
          <p class="panel-sub">顯示所有桌遊的基本資料與目前狀態，方便快速檢查是否已下架或維修中。</p>

          <div class="toolbar">
            <div>
              <button class="pill-tab active" data-filter="all">全部</button>
              <button class="pill-tab" data-filter="available">可借</button>
              <button class="pill-tab" data-filter="borrowed">借出中</button>
              <button class="pill-tab" data-filter="maintenance">維修/缺件</button>
            </div>
          </div>

          <div id="gamesList" class="list"></div>
        </aside>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://bgit-boardgame-management.voicebgit.workers.dev'; // 換成你的 Worker / Script URL
    const ADMIN_PASSWORD = 'bg-boardgame-admin'; // 先用簡單密碼，可之後改

    const state = {
      games: [],
      loggedIn: false
    };

    function setLoginStatus(ok) {
      state.loggedIn = ok;
      const status = document.getElementById('loginStatus');
      const area = document.getElementById('protectedArea');
      if (ok) {
        status.textContent = '已登入內部管理頁';
        status.classList.remove('locked');
        status.classList.add('success-text');
        area.classList.remove('hidden');
      } else {
        status.textContent = '尚未登入';
        status.classList.remove('success-text');
        status.classList.add('locked');
        area.classList.add('hidden');
      }
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
      const pwd = document.getElementById('adminPassword').value.trim();
      if (!pwd) {
        alert('請輸入管理密碼');
        return;
      }
      if (pwd === ADMIN_PASSWORD) {
        setLoginStatus(true);
        loadGames();
      } else {
        alert('密碼不正確');
        setLoginStatus(false);
      }
    });

    async function apiGet(params) {
      const url = new URL(API_URL);
      Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
      const res = await fetch(url.toString());
      return res.json();
    }

    async function apiPost(payload) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      return res.json();
    }

    async function loadGames() {
      try {
        const json = await apiGet({ action: 'listGames' });
        if (!json.ok) throw new Error(json.error || 'listGames failed');
        state.games = json.games || [];
        populateExistingSelect();
        renderGamesList();
      } catch (err) {
        console.error(err);
        document.getElementById('gamesList').innerHTML = '<div class="small">載入桌遊資料時出現問題。</div>';
      }
    }

    function populateExistingSelect() {
      const sel = document.getElementById('existingGameSelect');
      if (!state.games.length) {
        sel.innerHTML = '<option value="">尚未有桌遊</option>';
        return;
      }
      sel.innerHTML = '<option value="">選擇桌遊或手動輸入 Game ID</option>' +
        state.games.map(g => `<option value="${g.gameId}">${g.gameId}｜${g.name}</option>`).join('');
      sel.addEventListener('change', () => {
        const id = sel.value;
        if (!id) return;
        const g = state.games.find(x => x.gameId === id);
        if (!g) return;
        document.getElementById('gameId').value = g.gameId;
        document.getElementById('gameName').value = g.name || '';
        document.getElementById('gameCategory').value = g.category || '';
        document.getElementById('gameStatus').value = g.status || 'available';
        document.getElementById('gameCover').value = g.coverImageUrl || '';
        document.getElementById('gameShort').value = g.shortPlay || '';
        document.getElementById('gameDetail').value = g.detailPlay || '';
        document.getElementById('gameYoutube').value = g.youtubeUrl || '';
        document.getElementById('gamePublicNote').value = g.publicNote || '';
        document.getElementById('gameInternalNote').value = g.internalNote || '';
        // Items 之後可以接 gameDetail API 讀出來再填入。
      });
    }

    function renderGamesList(filter = 'all') {
      const list = document.getElementById('gamesList');
      const games = state.games.filter(g => filter === 'all' || g.status === filter);
      if (!games.length) {
        list.innerHTML = '<div class="small">目前沒有符合條件的桌遊。</div>';
        return;
      }
      list.innerHTML = games.map(g => {
        const statusLabel = ({
          available: '可借',
          borrowed: '借出中',
          pending_handover: '待交收',
          maintenance: '維修/缺件',
          inactive: '已下架'
        })[g.status] || g.status;
        return `
          <div class="list-row">
            <div class="list-main">
              <strong>${g.name}</strong>
              <div><span>${g.gameId}</span> ｜ <span>${g.category || '未分類'}</span></div>
              <div class="small">借用次數：${g.borrowCount || 0} 次｜最近借出：${g.lastBorrowAt || '—'}</div>
            </div>
            <div>
              <div class="badge">狀態：${statusLabel}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    document.querySelectorAll('.pill-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.pill-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGamesList(btn.dataset.filter);
      });
    });

    document.getElementById('gameForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const saveStatus = document.getElementById('saveStatus');
      const gameId = document.getElementById('gameId').value.trim();
      const gameName = document.getElementById('gameName').value.trim();
      if (!gameId || !gameName) {
        alert('請填寫 Game ID 與桌遊名稱');
        return;
      }
      const game = {
        gameId,
        name: gameName,
        category: document.getElementById('gameCategory').value.trim(),
        status: document.getElementById('gameStatus').value,
        coverImageUrl: document.getElementById('gameCover').value.trim(),
        shortPlay: document.getElementById('gameShort').value.trim(),
        detailPlay: document.getElementById('gameDetail').value.trim(),
        youtubeUrl: document.getElementById('gameYoutube').value.trim(),
        publicNote: document.getElementById('gamePublicNote').value.trim(),
        internalNote: document.getElementById('gameInternalNote').value.trim(),
        borrowCount: 0,
        lastBorrowAt: '',
        lastReturnAt: ''
      };
      const itemsLines = document.getElementById('itemsInput').value.split('\n').map(s => s.trim()).filter(Boolean);
      const items = itemsLines.map((line, idx) => {
        const [name, qty, unit, key] = line.split('|').map(s => (s || '').trim());
        return {
          itemName: name,
          qty: Number(qty || 0),
          unit: unit || '件',
          sortOrder: idx + 1,
          isKeyItem: String(key).toUpperCase() === 'TRUE'
        };
      });
      try {
        saveStatus.textContent = '儲存中⋯⋯';
        const json = await apiPost({ action: 'saveGame', game, items });
        if (!json.ok) throw new Error(json.error || 'saveGame failed');
        saveStatus.textContent = '已儲存，前台桌遊列表已更新。';
        await loadGames();
      } catch (err) {
        console.error(err);
        saveStatus.textContent = '儲存時出現錯誤。';
        alert('儲存桌遊資料時出現問題。');
      }
    });
  </script>
</body>
</html>
