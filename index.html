<script>
const API_URL = 'https://bgit-boardgame-management.voicebgit.workers.dev';

const state = {
  games: [],
  currentGameId: '',
  currentBorrowRecord: null
};

function escapeHtml(value = '') {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function apiPost(action, payload = {}) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, ...payload })
  });

  const json = await res.json().catch(() => ({}));
  if (!res.ok || json.ok === false) {
    throw new Error(json.error || 'request failed');
  }
  return json;
}

function getStatusLabel(status) {
  switch (status) {
    case 'available': return '可借';
    case 'borrowed': return '借出中';
    case 'maintenance': return '維修 / 缺件';
    case 'inactive': return '已下架';
    default: return '未設定';
  }
}

function formatDateTime(value) {
  if (!value) return '—';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return '—';
  return d.toLocaleString('zh-HK', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit'
  });
}

function populateBorrowSelect() {
  const select = document.getElementById('borrowGameId');
  const availableGames = state.games.filter(g => g.status === 'available');

  if (!availableGames.length) {
    select.innerHTML = '<option value="">目前沒有可借桌遊</option>';
    select.disabled = true;
    return;
  }

  select.disabled = false;
  select.innerHTML = availableGames.map(g => `
    <option value="${escapeHtml(g.gameId || '')}">
      ${escapeHtml(g.name || '未命名桌遊')}
    </option>
  `).join('');

  if (state.currentGameId && availableGames.some(g => g.gameId === state.currentGameId)) {
    select.value = state.currentGameId;
  }
}

function renderGameGrid() {
  const grid = document.getElementById('gameGrid');

  if (!state.games.length) {
    grid.innerHTML = `<div class="empty-state">目前未有桌遊資料</div>`;
    return;
  }

  grid.innerHTML = state.games.map(g => {
    const canBorrow = g.status === 'available';
    return `
      <article class="game-card">
        <div class="game-card-body">
          <div class="game-card-top">
            <span class="status-chip status-${escapeHtml(g.status || '')}">
              ${escapeHtml(getStatusLabel(g.status))}
            </span>
          </div>

          <h3 class="game-card-title">${escapeHtml(g.name || '未命名桌遊')}</h3>
          <p class="game-card-meta">${escapeHtml(g.category || '未分類')}</p>
          <p class="game-card-desc">${escapeHtml(g.shortPlay || '')}</p>

          <div class="game-card-actions">
            <button type="button" class="btn-small btn-ghost" data-detail="${escapeHtml(g.gameId || '')}">
              查看詳情
            </button>
            <button
              type="button"
              class="btn-small btn-main"
              data-borrow="${escapeHtml(g.gameId || '')}"
              ${canBorrow ? '' : 'disabled'}
            >
              ${canBorrow ? '預約借用' : '暫不可借'}
            </button>
          </div>
        </div>
      </article>
    `;
  }).join('');

  grid.querySelectorAll('[data-detail]').forEach(btn => {
    btn.addEventListener('click', () => {
      const gameId = btn.getAttribute('data-detail');
      showGameDetail(gameId);
    });
  });

  grid.querySelectorAll('[data-borrow]').forEach(btn => {
    btn.addEventListener('click', () => {
      const gameId = btn.getAttribute('data-borrow');
      const game = state.games.find(g => g.gameId === gameId);

      if (!game || game.status !== 'available') {
        alert('此桌遊目前不可借用');
        return;
      }

      state.currentGameId = gameId;
      populateBorrowSelect();
      document.getElementById('borrowGameId').value = gameId;
      document.getElementById('borrowSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

function showGameDetail(gameId) {
  const game = state.games.find(g => g.gameId === gameId);
  const modalBody = document.getElementById('gameDetailBody');

  if (!game) {
    modalBody.innerHTML = '<p>找不到桌遊資料</p>';
    return;
  }

  const items = Array.isArray(game.items) && game.items.length
    ? `<ul class="detail-items">${game.items.map(item => `
        <li>
          ${escapeHtml(item.itemName || '')}
          ${item.quantity ? ` × ${escapeHtml(String(item.quantity))}` : ''}
          ${item.unit ? ` ${escapeHtml(item.unit)}` : ''}
          ${item.isKeyItem ? '（重點）' : ''}
        </li>
      `).join('')}</ul>`
    : '<p>暫無配件資料</p>';

  const yt = game.youtubeUrl
    ? `<p><a href="${escapeHtml(game.youtubeUrl)}" target="_blank" rel="noopener noreferrer">觀看教學影片</a></p>`
    : '';

  modalBody.innerHTML = `
    <div class="detail-block">
      <h3>${escapeHtml(game.name || '未命名桌遊')}</h3>
      <p>${escapeHtml(game.category || '未分類')}・${escapeHtml(getStatusLabel(game.status))}</p>
    </div>
    <div class="detail-block">
      <p>${escapeHtml(game.detailPlay || game.shortPlay || '暫無介紹')}</p>
    </div>
    <div class="detail-block">
      <h4>配件清單</h4>
      ${items}
    </div>
    <div class="detail-block">
      <h4>公開備註</h4>
      <p>${escapeHtml(game.publicNote || '暫無')}</p>
    </div>
    ${yt}
  `;

  document.getElementById('gameDetailModal').classList.remove('hidden');
}

async function loadGames() {
  const json = await apiPost('listGames');
  state.games = Array.isArray(json.games) ? json.games : [];
  renderGameGrid();
  populateBorrowSelect();
}

document.getElementById('borrowForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const gameId = document.getElementById('borrowGameId').value.trim();
  const borrowerName = document.getElementById('borrowerName').value.trim();
  const borrowerContact = document.getElementById('borrowerContact').value.trim();

  if (!gameId || !borrowerName || !borrowerContact) {
    alert('請填寫完整借用資料');
    return;
  }

  const game = state.games.find(g => g.gameId === gameId);
  if (!game || game.status !== 'available') {
    alert('此桌遊目前不可借用');
    return;
  }

  try {
    const json = await apiPost('borrowGame', {
      gameId,
      borrowerName,
      borrowerContact
    });

    state.currentBorrowRecord = json.record || null;
    alert('借用申請已提交');
    document.getElementById('borrowForm').reset();
    await loadGames();
  } catch (err) {
    console.error(err);
    alert('借用失敗：' + err.message);
  }
});

document.getElementById('closeGameDetail').addEventListener('click', () => {
  document.getElementById('gameDetailModal').classList.add('hidden');
});

loadGames();
</script>
